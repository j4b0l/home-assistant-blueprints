blueprint:
  name: Sun Azimuth Cover Control
  description: |
    Position covers automatically based on the sun's azimuth.

    Each of the four facades (north / south / east / west) is assigned a target
    cover position depending on where the sun currently is relative to that
    facade, using four zones:

      - none            sun is not on the facade
      - indirect-early  sun just started grazing the facade (rising side)
      - direct          sun shines straight onto the facade
      - indirect-late   sun is about to leave the facade (setting side)

    Zone boundaries per facade (facing = cardinal direction + building offset):
      |az - facing|  <  45   -> direct
        45 .. 90  before      -> indirect-early
        45 .. 90  after       -> indirect-late
      otherwise               -> none

    The sun sweeps a full 360 degrees over the day. Sun-azimuth positioning is
    applied while the sun is above the horizon (from the elevation entity) and
    inside the active window. The active window is either a fixed time window
    (which may span midnight) or, when "use sunrise/sunset" is enabled, exactly
    sunrise-to-sunset.

    In time-window mode, while the sun is still below the horizon:
      - between the start time and sunrise -> morning position (all covers)
      - between sunset and the end time    -> evening position (all covers)

    Outside the active window: if "close fully at night" is enabled, every
    configured cover is driven to the night position (fully closed by default);
    otherwise nothing moves and covers keep whatever position they had.

    Optionally, a cloud coverage entity can switch every phase (except the night
    close) to a separate set of "- cloudy" positions whenever coverage is above
    a configurable threshold. Cloud changes are picked up on the regular 5-minute
    re-evaluation.

    A cover is only commanded when its current position actually differs from
    the target, to avoid needless motor movement.

    An optional guard stops the automation completely (no sun positioning and
    no night close): either a single boolean entity (e.g. an "out of home"
    helper) or an advanced "disable when" condition where any matching
    condition halts the run - build an OR group for cases like
    "out of home OR vacation".

    Position convention follows Home Assistant: 100 = fully open, 0 = fully
    closed. Covers must support set_cover_position. All configured covers are
    re-evaluated on every azimuth change and every few minutes.

    Version: 2026-07-01
  domain: automation

  input:
    sun_section:
      name: Sun & building
      icon: mdi:weather-sunny
      input:
        azimuth_entity:
          name: Sun azimuth entity
          description: >
            Entity whose numeric state is the sun azimuth in degrees (0-360).
            For the built-in Sun integration use the "sensor.sun_solar_azimuth"
            sensor (enable it if needed) - the sun.sun entity itself exposes
            azimuth only as an attribute and cannot be used here directly.
          selector:
            entity:
              filter:
                domain:
                  - sensor
                  - input_number
        elevation_entity:
          name: Sun elevation entity
          description: >
            Entity whose numeric state is the sun elevation in degrees.
            Positive = sun above the horizon (daytime), negative = below.
            For the built-in Sun integration use the
            "sensor.sun_solar_elevation" sensor. Used to detect sunrise/sunset
            and the morning/evening twilight phases.
          selector:
            entity:
              filter:
                domain:
                  - sensor
                  - input_number
        building_offset:
          name: Building offset
          description: >
            Rotation of the building away from the true north-south / east-west
            axes, in degrees. Positive rotates the reference directions
            clockwise. Range -45 to +45.
          default: 0
          selector:
            number:
              min: -45
              max: 45
              step: 1
              unit_of_measurement: "°"
              mode: slider

    groups_section:
      name: Cover groups
      icon: mdi:window-shutter
      description: One cover group per facade. Any group may be left empty.
      input:
        covers_north:
          name: North covers
          default: []
          selector:
            entity:
              multiple: true
              filter:
                domain: cover
        covers_east:
          name: East covers
          default: []
          selector:
            entity:
              multiple: true
              filter:
                domain: cover
        covers_south:
          name: South covers
          default: []
          selector:
            entity:
              multiple: true
              filter:
                domain: cover
        covers_west:
          name: West covers
          default: []
          selector:
            entity:
              multiple: true
              filter:
                domain: cover

    positions_section:
      name: Target positions
      icon: mdi:arrow-up-down
      description: >
        Cover position (0 = closed, 100 = open) for each sun zone. Each zone has
        a clear-sky value and a separate value used when it is cloudy (see the
        Cloud coverage section). The cloudy value is ignored if no cloud entity
        is configured.
      input:
        pct_none:
          name: None (sun not on facade)
          default: 100
          selector:
            number:
              min: 0
              max: 100
              step: 1
              unit_of_measurement: "%"
              mode: slider
        pct_none_cloudy:
          name: None - cloudy
          default: 100
          selector:
            number:
              min: 0
              max: 100
              step: 1
              unit_of_measurement: "%"
              mode: slider
        pct_indirect_early:
          name: Indirect - early (sun just arriving)
          default: 70
          selector:
            number:
              min: 0
              max: 100
              step: 1
              unit_of_measurement: "%"
              mode: slider
        pct_indirect_early_cloudy:
          name: Indirect - early - cloudy
          default: 90
          selector:
            number:
              min: 0
              max: 100
              step: 1
              unit_of_measurement: "%"
              mode: slider
        pct_direct:
          name: Direct (sun straight on facade)
          default: 30
          selector:
            number:
              min: 0
              max: 100
              step: 1
              unit_of_measurement: "%"
              mode: slider
        pct_direct_cloudy:
          name: Direct - cloudy
          default: 70
          selector:
            number:
              min: 0
              max: 100
              step: 1
              unit_of_measurement: "%"
              mode: slider
        pct_indirect_late:
          name: Indirect - late (sun about to leave)
          default: 70
          selector:
            number:
              min: 0
              max: 100
              step: 1
              unit_of_measurement: "%"
              mode: slider
        pct_indirect_late_cloudy:
          name: Indirect - late - cloudy
          default: 90
          selector:
            number:
              min: 0
              max: 100
              step: 1
              unit_of_measurement: "%"
              mode: slider

    cloud_section:
      name: Cloud coverage
      icon: mdi:weather-partly-cloudy
      description: >
        Optional. When it is cloudy, the "- cloudy" position variants are used
        for every state except the night position. Leave the entity empty to
        always use the clear-sky positions.
      input:
        cloud_entity:
          name: Cloud coverage entity
          description: >
            Optional entity whose numeric state is the cloud coverage in percent
            (0-100). For the built-in Met.no weather you can create a template
            sensor from the "cloud_coverage" attribute.
          default:
          selector:
            entity:
              filter:
                domain:
                  - sensor
                  - input_number
        cloudy_threshold:
          name: Cloudy above
          description: >
            Cloud coverage strictly above this percentage counts as "cloudy".
          default: 70
          selector:
            number:
              min: 0
              max: 100
              step: 1
              unit_of_measurement: "%"
              mode: slider

    schedule_section:
      name: Schedule
      icon: mdi:clock-outline
      description: >
        When the covers are allowed to move. Either a fixed time window, or -
        with the toggle below - the sunrise/sunset window derived from the sun
        elevation.
      input:
        use_sun_times:
          name: Use sunrise/sunset instead of the time window
          description: >
            When enabled the time window below is ignored and covers are only
            controlled while the sun is above the horizon (sunrise to sunset).
            The morning/evening positions are then unused.
          default: false
          selector:
            boolean: {}
        start_time:
          name: Allowed from
          description: Start of the time window (ignored when the toggle above is on).
          default: "08:00:00"
          selector:
            time: {}
        end_time:
          name: Allowed until
          description: End of the time window (ignored when the toggle above is on).
          default: "20:00:00"
          selector:
            time: {}
        morning_position:
          name: Morning position (before sunrise)
          description: >
            Position for all covers between the start time and sunrise (while
            the sun is still below the horizon in the morning). Time-window
            mode only.
          default: 100
          selector:
            number:
              min: 0
              max: 100
              step: 1
              unit_of_measurement: "%"
              mode: slider
        morning_position_cloudy:
          name: Morning position - cloudy
          default: 100
          selector:
            number:
              min: 0
              max: 100
              step: 1
              unit_of_measurement: "%"
              mode: slider
        evening_position:
          name: Evening position (after sunset)
          description: >
            Position for all covers between sunset and the end time (while the
            sun is below the horizon in the evening). Time-window mode only.
          default: 100
          selector:
            number:
              min: 0
              max: 100
              step: 1
              unit_of_measurement: "%"
              mode: slider
        evening_position_cloudy:
          name: Evening position - cloudy
          default: 100
          selector:
            number:
              min: 0
              max: 100
              step: 1
              unit_of_measurement: "%"
              mode: slider
        night_close_enabled:
          name: Close fully at night
          description: >
            When enabled, all configured covers are driven to the night
            position while the current time is OUTSIDE the allowed window.
            When disabled, covers are left untouched outside the window.
          default: false
          selector:
            boolean: {}
        night_close_position:
          name: Night position
          description: >
            Cover position used outside the window when "Close fully at night"
            is enabled (0 = fully closed, 100 = fully open).
          default: 0
          selector:
            number:
              min: 0
              max: 100
              step: 1
              unit_of_measurement: "%"
              mode: slider

    guard_section:
      name: Disable / guard
      icon: mdi:cancel
      description: >
        Optional conditions that stop the automation completely (no sun
        positioning and no night close).
      input:
        disable_boolean:
          name: Disable entity
          description: >
            Optional boolean-like entity (input_boolean, binary_sensor, ...).
            While its state is "on" the automation does nothing. Leave empty
            to not use it.
          default:
          selector:
            entity:
              filter:
                - domain: input_boolean
                - domain: binary_sensor
                - domain: switch
        disable_condition:
          name: Disable when (advanced)
          description: >
            Optional condition(s). If ANY of them is true the automation stops.
            For "out of home OR vacation" add both state conditions here (each
            is checked independently). Leave empty to not use it.
          default: []
          selector:
            condition: {}

# Derived per-instance values and the list of cover commands to apply.
variables:
  azimuth_entity: !input azimuth_entity
  elevation_entity: !input elevation_entity
  building_offset: !input building_offset
  covers_north: !input covers_north
  covers_east: !input covers_east
  covers_south: !input covers_south
  covers_west: !input covers_west
  pct_none: !input pct_none
  pct_indirect_early: !input pct_indirect_early
  pct_direct: !input pct_direct
  pct_indirect_late: !input pct_indirect_late
  pct_none_cloudy: !input pct_none_cloudy
  pct_indirect_early_cloudy: !input pct_indirect_early_cloudy
  pct_direct_cloudy: !input pct_direct_cloudy
  pct_indirect_late_cloudy: !input pct_indirect_late_cloudy
  start_time: !input start_time
  end_time: !input end_time
  use_sun_times: !input use_sun_times
  morning_position: !input morning_position
  evening_position: !input evening_position
  morning_position_cloudy: !input morning_position_cloudy
  evening_position_cloudy: !input evening_position_cloudy
  cloud_entity: !input cloud_entity
  cloudy_threshold: !input cloudy_threshold
  night_close_enabled: !input night_close_enabled
  night_close_position: !input night_close_position
  disable_boolean: !input disable_boolean
  # commands: [{entity_id, position}, ...] to apply this run.
  # First the active "phase" is decided, then it is turned into positions.
  # When it is cloudy (cloud entity set and above the threshold) the "- cloudy"
  # position variants are used for every phase except the night close.
  #   sun      -> sun-azimuth based positions per facade
  #   morning  -> morning_position for every cover (window mode, before sunrise)
  #   evening  -> evening_position for every cover (window mode, after sunset)
  #   off      -> night_close_position for every cover (only if night close on)
  commands: >
    {% set all_covers = covers_north + covers_east + covers_south + covers_west %}
    {% set ns = namespace(items=[]) %}
    {% set cloudy = cloud_entity not in [none, '', 'none']
                    and (states(cloud_entity) | is_number)
                    and (states(cloud_entity) | float(0) > cloudy_threshold | float(0)) %}
    {% set p_none    = pct_none_cloudy          if cloudy else pct_none %}
    {% set p_early   = pct_indirect_early_cloudy if cloudy else pct_indirect_early %}
    {% set p_direct  = pct_direct_cloudy        if cloudy else pct_direct %}
    {% set p_late    = pct_indirect_late_cloudy if cloudy else pct_indirect_late %}
    {% set p_morning = morning_position_cloudy  if cloudy else morning_position %}
    {% set p_evening = evening_position_cloudy  if cloudy else evening_position %}
    {% if not (states(elevation_entity) | is_number) %}
      {# elevation unavailable -> do nothing #}
      {% set phase = 'skip' %}
    {% else %}
      {% set elev = states(elevation_entity) | float(0) %}
      {% set day = elev > 0 %}
      {% if use_sun_times %}
        {# sunrise/sunset window: active only while the sun is up #}
        {% set phase = 'sun' if day else 'off' %}
      {% else %}
        {% set now_t = now().strftime('%H:%M:%S') %}
        {% set in_window = (start_time <= now_t < end_time) if start_time <= end_time
                           else (now_t >= start_time or now_t < end_time) %}
        {% if not in_window %}
          {% set phase = 'off' %}
        {% elif day %}
          {% set phase = 'sun' %}
        {% else %}
          {# inside window but sun below horizon: split morning vs evening
             by the window midpoint (handles windows crossing midnight) #}
          {% set sm = start_time[0:2] | int * 60 + start_time[3:5] | int %}
          {% set em = end_time[0:2] | int * 60 + end_time[3:5] | int %}
          {% set nm = now().hour * 60 + now().minute %}
          {% set span = (em - sm) if em >= sm else (em + 1440 - sm) %}
          {% set elapsed = (nm - sm) if nm >= sm else (nm + 1440 - sm) %}
          {% set phase = 'morning' if elapsed < span / 2 else 'evening' %}
        {% endif %}
      {% endif %}
    {% endif %}
    {% if phase == 'sun' and (states(azimuth_entity) | is_number) %}
      {% set az = states(azimuth_entity) | float(0) %}
      {% set off = building_offset | float(0) %}
      {% set groups = [
        {'covers': covers_north, 'facing': (0   + off) % 360},
        {'covers': covers_east,  'facing': (90  + off) % 360},
        {'covers': covers_south, 'facing': (180 + off) % 360},
        {'covers': covers_west,  'facing': (270 + off) % 360}] %}
      {% for g in groups %}
        {% set d = ((az - g.facing + 180) % 360) - 180 %}
        {% if d >= -45 and d < 45 %}
          {% set pos = p_direct %}
        {% elif d >= -90 and d < -45 %}
          {% set pos = p_early %}
        {% elif d >= 45 and d < 90 %}
          {% set pos = p_late %}
        {% else %}
          {% set pos = p_none %}
        {% endif %}
        {% for cv in g.covers %}
          {% set ns.items = ns.items + [{'entity_id': cv, 'position': pos | int}] %}
        {% endfor %}
      {% endfor %}
    {% elif phase == 'morning' %}
      {% for cv in all_covers %}
        {% set ns.items = ns.items + [{'entity_id': cv, 'position': p_morning | int}] %}
      {% endfor %}
    {% elif phase == 'evening' %}
      {% for cv in all_covers %}
        {% set ns.items = ns.items + [{'entity_id': cv, 'position': p_evening | int}] %}
      {% endfor %}
    {% elif phase == 'off' and night_close_enabled %}
      {% for cv in all_covers %}
        {% set ns.items = ns.items + [{'entity_id': cv, 'position': night_close_position | int}] %}
      {% endfor %}
    {% endif %}
    {{ ns.items }}

trigger:
  - platform: state
    entity_id: !input azimuth_entity
  - platform: state
    entity_id: !input elevation_entity
  - platform: time_pattern
    minutes: "/5"
  - platform: time
    at: !input start_time
  - platform: time
    at: !input end_time
  - platform: homeassistant
    event: start

condition:
  # Guard: stop entirely while the disable entity is on.
  - condition: template
    value_template: "{{ disable_boolean == none or not is_state(disable_boolean, 'on') }}"
  # Guard: stop entirely if ANY of the advanced "disable when" conditions is true.
  - condition: not
    conditions: !input disable_condition

action:
  - repeat:
      for_each: "{{ commands }}"
      sequence:
        - variables:
            e: "{{ repeat.item.entity_id }}"
            target_pos: "{{ repeat.item.position | int }}"
            current: "{{ state_attr(repeat.item.entity_id, 'current_position') }}"
        # Only move a cover whose position actually differs from the target.
        - if:
            - condition: template
              value_template: "{{ current is none or (current | int(-1)) != target_pos }}"
          then:
            - service: cover.set_cover_position
              target:
                entity_id: "{{ e }}"
              data:
                position: "{{ target_pos }}"

mode: queued
max: 10
