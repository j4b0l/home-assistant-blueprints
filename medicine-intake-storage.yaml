variables:
  warn_days: !input warn_days
  med_1_name: !input med_1_name
  med_1_storage: !input med_1_storage
  med_1_intake: !input med_1_intake
  med_2_name: !input med_2_name
  med_2_storage: !input med_2_storage
  med_2_intake: !input med_2_intake
  med_3_name: !input med_3_name
  med_3_storage: !input med_3_storage
  med_3_intake: !input med_3_intake
  med_4_name: !input med_4_name
  med_4_storage: !input med_4_storage
  med_4_intake: !input med_4_intake
  med_5_name: !input med_5_name
  med_5_storage: !input med_5_storage
  med_5_intake: !input med_5_intake
  med_6_name: !input med_6_name
  med_6_storage: !input med_6_storage
  med_6_intake: !input med_6_intake
  med_7_name: !input med_7_name
  med_7_storage: !input med_7_storage
  med_7_intake: !input med_7_intake
  med_8_name: !input med_8_name
  med_8_storage: !input med_8_storage
  med_8_intake: !input med_8_intake
  med_9_name: !input med_9_name
  med_9_storage: !input med_9_storage
  med_9_intake: !input med_9_intake
  med_10_name: !input med_10_name
  med_10_storage: !input med_10_storage
  med_10_intake: !input med_10_intake
  # Configured medicine slots that actually have a storage + intake helper set.
  meds: >
    {% set raw = [
      {'name': med_1_name,  'storage': med_1_storage,  'intake': med_1_intake},
      {'name': med_2_name,  'storage': med_2_storage,  'intake': med_2_intake},
      {'name': med_3_name,  'storage': med_3_storage,  'intake': med_3_intake},
      {'name': med_4_name,  'storage': med_4_storage,  'intake': med_4_intake},
      {'name': med_5_name,  'storage': med_5_storage,  'intake': med_5_intake},
      {'name': med_6_name,  'storage': med_6_storage,  'intake': med_6_intake},
      {'name': med_7_name,  'storage': med_7_storage,  'intake': med_7_intake},
      {'name': med_8_name,  'storage': med_8_storage,  'intake': med_8_intake},
      {'name': med_9_name,  'storage': med_9_storage,  'intake': med_9_intake},
      {'name': med_10_name, 'storage': med_10_storage, 'intake': med_10_intake}] %}
    {% set ns = namespace(items=[]) %}
    {% for m in raw %}
      {% if m.storage not in [none, '', 'none'] and m.intake not in [none, '', 'none'] %}
        {% set ns.items = ns.items + [m] %}
      {% endif %}
    {% endfor %}
    {{ ns.items }}

trigger:
  - platform: time
    at: !input notify_time

action:
  # Snapshot each medicine: current stock, intake, new stock, days of supply left.
  - variables:
      rows: >
        {% set ns = namespace(rows=[]) %}
        {% for m in meds %}
          {% set cur = states(m.storage) | float(0) %}
          {% set intake = states(m.intake) | float(0) %}
          {% set newv = [cur - intake, 0] | max %}
          {% set days = (newv / intake) if intake > 0 else -1 %}
          {% set label = m.name if m.name not in [none, ''] else (state_attr(m.storage, 'friendly_name') or m.storage) %}
          {% set ns.rows = ns.rows + [{
            'storage': m.storage, 'new': newv, 'intake': intake,
            'days': days, 'label': label}] %}
        {% endfor %}
        {{ ns.rows }}
  # 1) Decrement every storage helper by its daily intake.
  - repeat:
      for_each: "{{ rows }}"
      sequence:
        - service: input_number.set_value
          target:
            entity_id: "{{ repeat.item.storage }}"
          data:
            value: "{{ repeat.item.new }}"
  # 2) Build the "running low" summary and notify if anything is low.
  - variables:
      low: >
        {{ rows | selectattr('days', 'ge', 0)
                | selectattr('days', 'lt', warn_days | float(0)) | list }}
      summary: >-
        {%- set ns2 = namespace(lines=[]) -%}
        {%- for r in low -%}
          {%- set ns2.lines = ns2.lines + ['• ' ~ r.label ~ ': ' ~ (r.new | round(0)) ~ ' left (~' ~ (r.days | round(1)) ~ ' day(s), ' ~ (r.intake | round(0)) ~ '/day)'] -%}
        {%- endfor -%}
        {{ ns2.lines | join('\n') }}
  - if:
      - condition: template
        value_template: "{{ low | count > 0 }}"
    then:
      - repeat:
          for_each: !input notify_devices
          sequence:
            # Device actions reject a templated device_id, so call the
            # mobile_app notify service built from the device's (original)
            # name instead. This is what the companion app registers as
            # notify.mobile_app_<slugified device name>.
            - service: >-
                notify.mobile_app_{{ device_attr(repeat.item, 'name') | slugify }}
              data:
                title: !input notify_title
                message: "{{ summary }}"

mode: single
