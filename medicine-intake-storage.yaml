blueprint:
  name: Medicine Intake & Storage Tracker
  description: |
    Track medicine stock and warn before it runs out.

    Configure up to 10 medicines. Each medicine is a pair of number helpers:
      - Storage    : current stock count (input_number)
      - Daily intake: how many units are taken per day (input_number)

    Once a day, at the configured time, the automation:
      1. Decrements every storage helper by its daily intake (clamped at 0).
      2. Computes the remaining days of supply (storage / daily intake).
      3. If any medicine has fewer than the configured number of days left,
         it is added to a summary that is pushed to the selected devices.

    Only medicines whose Storage helper is set are processed; empty slots are
    ignored, so you can use as many of the 10 slots as you need. Helpers must
    be "number" helpers (input_number).

    Version: 2026-07-02
  domain: automation

  input:
    settings_section:
      name: Settings
      icon: mdi:cog
      input:
        notify_time:
          name: Daily time
          description: >
            Time of day when stock is decremented and notifications are sent.
          default: "08:00:00"
          selector:
            time: {}
        warn_days:
          name: Warn this many days early
          description: >
            Notify when a medicine has fewer than this many days of supply
            left (0-30). 0 effectively disables early warnings.
          default: 7
          selector:
            number:
              min: 0
              max: 30
              step: 1
              unit_of_measurement: days
              mode: slider
        notify_devices:
          name: Notification targets
          description: One or more mobile devices to notify (companion app).
          selector:
            device:
              multiple: true
              filter:
                - integration: mobile_app
        notify_title:
          name: Notification title
          default: "💊 Medicine running low"
          selector:
            text: {}

    medicine_1_section:
      name: Medicine 1
      icon: mdi:pill
      collapsed: true
      input:
        med_1_name:
          name: "Medicine 1: name"
          description: Optional label used in the summary (defaults to the storage helper name).
          default: ""
          selector:
            text: {}
        med_1_storage:
          name: "Medicine 1: storage helper"
          default:
          selector:
            entity:
              filter:
                domain: input_number
        med_1_intake:
          name: "Medicine 1: daily intake helper"
          default:
          selector:
            entity:
              filter:
                domain: input_number

    medicine_2_section:
