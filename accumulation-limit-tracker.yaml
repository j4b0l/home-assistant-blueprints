variables:
  warn_days: !input warn_days
  item_1_name: !input item_1_name
  item_1_value: !input item_1_value
  item_1_increase: !input item_1_increase
  item_2_name: !input item_2_name
  item_2_value: !input item_2_value
  item_2_increase: !input item_2_increase
  item_3_name: !input item_3_name
  item_3_value: !input item_3_value
  item_3_increase: !input item_3_increase
  item_4_name: !input item_4_name
  item_4_value: !input item_4_value
  item_4_increase: !input item_4_increase
  item_5_name: !input item_5_name
  item_5_value: !input item_5_value
  item_5_increase: !input item_5_increase
  item_6_name: !input item_6_name
  item_6_value: !input item_6_value
  item_6_increase: !input item_6_increase
  item_7_name: !input item_7_name
  item_7_value: !input item_7_value
  item_7_increase: !input item_7_increase
  item_8_name: !input item_8_name
  item_8_value: !input item_8_value
  item_8_increase: !input item_8_increase
  item_9_name: !input item_9_name
  item_9_value: !input item_9_value
  item_9_increase: !input item_9_increase
  item_10_name: !input item_10_name
  item_10_value: !input item_10_value
  item_10_increase: !input item_10_increase
  # Configured slots that actually have both helpers set.
  items: >
    {% set raw = [
      {'name': item_1_name, 'a': item_1_value, 'b': item_1_increase},
      {'name': item_2_name, 'a': item_2_value, 'b': item_2_increase},
      {'name': item_3_name, 'a': item_3_value, 'b': item_3_increase},
      {'name': item_4_name, 'a': item_4_value, 'b': item_4_increase},
      {'name': item_5_name, 'a': item_5_value, 'b': item_5_increase},
      {'name': item_6_name, 'a': item_6_value, 'b': item_6_increase},
      {'name': item_7_name, 'a': item_7_value, 'b': item_7_increase},
      {'name': item_8_name, 'a': item_8_value, 'b': item_8_increase},
      {'name': item_9_name, 'a': item_9_value, 'b': item_9_increase},
      {'name': item_10_name, 'a': item_10_value, 'b': item_10_increase}] %}
    {% set ns = namespace(items=[]) %}
    {% for m in raw %}
      {% if m.a not in [none, '', 'none'] and m.b not in [none, '', 'none'] %}
        {% set ns.items = ns.items + [m] %}
      {% endif %}
    {% endfor %}
    {{ ns.items }}

trigger:
  - platform: time
    at: !input notify_time

condition:
  # Pause: if any "pause if" condition is true, skip this run entirely.
  - condition: not
    conditions: !input pause_condition

action:
  - variables:
      rows: >
        {% set ns = namespace(rows=[]) %}
        {% for m in items %}
          {% set cur = states(m.a) | float(0) %}
          {% set inc = states(m.b) | float(0) %}
          {% set maxv = state_attr(m.a, 'max') | float(100) %}
          {% set newv = [cur + inc, maxv] | min %}
          {% set days = ((maxv - newv) / inc) if inc > 0 else -1 %}
          {% set label = m.name if m.name not in [none, ''] else (state_attr(m.a, 'friendly_name') or m.a) %}
          {% set ns.rows = ns.rows + [{'target': m.a, 'new': newv, 'max': maxv, 'rate': inc, 'days': days, 'label': label}] %}
        {% endfor %}
        {{ ns.rows }}
  # 1) Increase every value helper by its daily increase (clamped at max).
  - repeat:
      for_each: "{{ rows }}"
      sequence:
        - service: input_number.set_value
          target:
            entity_id: "{{ repeat.item.target }}"
          data:
            value: "{{ repeat.item.new }}"
  # 2) Build the "approaching max" summary and notify if anything is close.
  - variables:
      low: >
        {{ rows | selectattr('days', 'ge', 0)
                | selectattr('days', 'lt', warn_days | float(0)) | list }}
      summary: >-
        {%- set ns2 = namespace(lines=[]) -%}
        {%- for r in low -%}
          {%- set ns2.lines = ns2.lines + ['• ' ~ r.label ~ ': ' ~ (r.new | round(0)) ~ '/' ~ (r.max | round(0)) ~ ' (~' ~ (r.days | round(1)) ~ ' day(s) to max, +' ~ (r.rate | round(0)) ~ '/day)'] -%}
        {%- endfor -%}
        {{ ns2.lines | join('\n') }}
  - if:
      - condition: template
        value_template: "{{ low | count > 0 }}"
    then:
      - repeat:
          for_each: !input notify_devices
          sequence:
            # Device actions reject a templated device_id, so call the mobile_app
            # notify service built from the device's (original) name instead.
            - service: >-
                notify.mobile_app_{{ device_attr(repeat.item, 'name') | slugify }}
              data:
                title: !input notify_title
                message: "{{ summary }}"

mode: single
