blueprint:
  name: Accumulation Limit Tracker
  description: |
    Track any value that grows over time (a savings goal, accumulated hours, a
    filling tank, a counter approaching a cap, ...) and warn how many days are
    left before it reaches its maximum.

    Configure up to 10 items. Each item is a pair of number helpers:
      - Value         : current value (input_number). Its "max" setting is the
                        limit that is tracked towards.
      - Daily increase: how much the value grows per day (input_number)

    Once a day, at the configured time, the automation:
      1. Increases every value helper by its daily increase (clamped at the
         helper's max).
      2. Computes the days remaining until the value reaches its max
         ((max - value) / daily increase).
      3. Sends a summary of every item that will hit its max within the
         configured number of days to the selected devices.

    The limit is the input_number helper's own "max" attribute, so set it on
    each Value helper. Slots whose helpers are empty are ignored.

    Version: 2026-07-02
  domain: automation

  input:
    settings_section:
      name: Settings
      icon: mdi:cog
      input:
        notify_time:
          name: Daily time
          description: >
            Time of day when values are updated and notifications are sent.
          default: "08:00:00"
          selector:
            time: {}
        warn_days:
          name: Warn threshold (days)
          description: >
            Notify when an item will reach its max within this many days (0-30). 0 disables early warnings.
          default: 7
          selector:
            number:
              min: 0
              max: 30
              step: 1
              unit_of_measurement: days
              mode: slider
        notify_devices:
          name: Notification targets
          description: One or more mobile devices to notify (companion app).
          selector:
            device:
              multiple: true
              filter:
                - integration: mobile_app
        notify_title:
          name: Notification title
          default: "📈 Approaching limit"
          selector:
            text: {}
        pause_condition:
          name: Pause if...
          description: >
            When any of these conditions is true, this run is skipped entirely
            (no counts are changed and no notification is sent).
          default: []
          selector:
            condition: {}

    item_1_section:
      name: Item 1
      icon: mdi:chart-line
      collapsed: true
      input:
        item_1_name:
          name: "Item 1: name"
          description: Optional label used in the summary (defaults to the helper name).
          default: ""
          selector:
            text: {}
        item_1_value:
          name: "Item 1: value helper"
          default:
          selector:
            entity:
              filter:
                domain: input_number
        item_1_increase:
          name: "Item 1: daily increase helper"
          default:
          selector:
            entity:
              filter:
                domain: input_number

    item_2_section:
      name: Item 2
