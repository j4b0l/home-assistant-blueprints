blueprint:
  name: Consumable Stock Tracker
  description: |
    Track any depleting consumable (coffee, filters, pet food, printer paper,
    ...) and warn before it runs out.

    Configure up to 10 items. Each item is a pair of number helpers:
      - Stock     : current amount on hand (input_number)
      - Daily use : how many units are consumed per day (input_number)

    Once a day, at the configured time, the automation:
      1. Decrements every stock helper by its daily use (clamped at 0).
      2. Computes the remaining days of supply (stock / daily use).
      3. Sends a summary of every item with fewer than the configured number of
         days left to the selected devices.

    Slots whose stock helper is empty are ignored; use as many as you need.

    Version: 2026-07-02
  domain: automation

  input:
    settings_section:
      name: Settings
      icon: mdi:cog
      input:
        notify_time:
          name: Daily time
          description: >
            Time of day when values are updated and notifications are sent.
          default: "08:00:00"
          selector:
            time: {}
        warn_days:
          name: Warn threshold (days)
          description: >
            Notify when an item has fewer than this many days of supply left (0-30). 0 disables early warnings.
          default: 7
          selector:
            number:
              min: 0
              max: 30
              step: 1
              unit_of_measurement: days
              mode: slider
        notify_devices:
          name: Notification targets
          description: One or more mobile devices to notify (companion app).
          selector:
            device:
              multiple: true
              filter:
                - integration: mobile_app
        notify_title:
          name: Notification title
          default: "📦 Stock running low"
          selector:
            text: {}

    item_1_section:
      name: Item 1
      icon: mdi:package-variant
      collapsed: true
      input:
        item_1_name:
          name: "Item 1: name"
          description: Optional label used in the summary (defaults to the helper name).
          default: ""
          selector:
            text: {}
        item_1_stock:
          name: "Item 1: stock helper"
          default:
          selector:
            entity:
              filter:
                domain: input_number
        item_1_use:
          name: "Item 1: daily use helper"
          default:
          selector:
            entity:
              filter:
                domain: input_number

    item_2_section:
