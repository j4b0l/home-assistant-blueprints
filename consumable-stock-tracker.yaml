variables:
  warn_days: !input warn_days
  item_1_name: !input item_1_name
  item_1_stock: !input item_1_stock
  item_1_use: !input item_1_use
  item_2_name: !input item_2_name
  item_2_stock: !input item_2_stock
  item_2_use: !input item_2_use
  item_3_name: !input item_3_name
  item_3_stock: !input item_3_stock
  item_3_use: !input item_3_use
  item_4_name: !input item_4_name
  item_4_stock: !input item_4_stock
  item_4_use: !input item_4_use
  item_5_name: !input item_5_name
  item_5_stock: !input item_5_stock
  item_5_use: !input item_5_use
  item_6_name: !input item_6_name
  item_6_stock: !input item_6_stock
  item_6_use: !input item_6_use
  item_7_name: !input item_7_name
  item_7_stock: !input item_7_stock
  item_7_use: !input item_7_use
  item_8_name: !input item_8_name
  item_8_stock: !input item_8_stock
  item_8_use: !input item_8_use
  item_9_name: !input item_9_name
  item_9_stock: !input item_9_stock
  item_9_use: !input item_9_use
  item_10_name: !input item_10_name
  item_10_stock: !input item_10_stock
  item_10_use: !input item_10_use
  # Configured slots that actually have both helpers set.
  items: >
    {% set raw = [
      {'name': item_1_name, 'a': item_1_stock, 'b': item_1_use},
      {'name': item_2_name, 'a': item_2_stock, 'b': item_2_use},
      {'name': item_3_name, 'a': item_3_stock, 'b': item_3_use},
      {'name': item_4_name, 'a': item_4_stock, 'b': item_4_use},
      {'name': item_5_name, 'a': item_5_stock, 'b': item_5_use},
      {'name': item_6_name, 'a': item_6_stock, 'b': item_6_use},
      {'name': item_7_name, 'a': item_7_stock, 'b': item_7_use},
      {'name': item_8_name, 'a': item_8_stock, 'b': item_8_use},
      {'name': item_9_name, 'a': item_9_stock, 'b': item_9_use},
      {'name': item_10_name, 'a': item_10_stock, 'b': item_10_use}] %}
    {% set ns = namespace(items=[]) %}
    {% for m in raw %}
      {% if m.a not in [none, '', 'none'] and m.b not in [none, '', 'none'] %}
        {% set ns.items = ns.items + [m] %}
      {% endif %}
    {% endfor %}
    {{ ns.items }}

trigger:
  - platform: time
    at: !input notify_time

action:
  - variables:
      rows: >
        {% set ns = namespace(rows=[]) %}
        {% for m in items %}
          {% set cur = states(m.a) | float(0) %}
          {% set use = states(m.b) | float(0) %}
          {% set newv = [cur - use, 0] | max %}
          {% set days = (newv / use) if use > 0 else -1 %}
          {% set label = m.name if m.name not in [none, ''] else (state_attr(m.a, 'friendly_name') or m.a) %}
          {% set ns.rows = ns.rows + [{'target': m.a, 'new': newv, 'rate': use, 'days': days, 'label': label}] %}
        {% endfor %}
        {{ ns.rows }}
  # 1) Decrement every stock helper by its daily use.
  - repeat:
      for_each: "{{ rows }}"
      sequence:
        - service: input_number.set_value
          target:
            entity_id: "{{ repeat.item.target }}"
          data:
            value: "{{ repeat.item.new }}"
  # 2) Build the "running low" summary and notify if anything is low.
  - variables:
      low: >
        {{ rows | selectattr('days', 'ge', 0)
                | selectattr('days', 'lt', warn_days | float(0)) | list }}
      summary: >-
        {%- set ns2 = namespace(lines=[]) -%}
        {%- for r in low -%}
          {%- set ns2.lines = ns2.lines + ['• ' ~ r.label ~ ': ' ~ (r.new | round(0)) ~ ' left (~' ~ (r.days | round(1)) ~ ' day(s), ' ~ (r.rate | round(0)) ~ '/day)'] -%}
        {%- endfor -%}
        {{ ns2.lines | join('\n') }}
  - if:
      - condition: template
        value_template: "{{ low | count > 0 }}"
    then:
      - repeat:
          for_each: !input notify_devices
          sequence:
            # Device actions reject a templated device_id, so call the mobile_app
            # notify service built from the device's (original) name instead.
            - service: >-
                notify.mobile_app_{{ device_attr(repeat.item, 'name') | slugify }}
              data:
                title: !input notify_title
                message: "{{ summary }}"

mode: single
